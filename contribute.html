html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0e1420;
  --card: #1a2035;

  --border: rgba(201,168,76,0.25);
  --border2: rgba(201,168,76,0.1);
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold3: #f5e0a0;
  --white: #ffffff;
  --label: #ebebf5;
  --label2: rgba(235,235,245,0.65);
  --muted: rgba(235,235,245,0.4);
  --green: #30d158;
  --blue: #4a90c4;
}

body {

.wrapper { max-width: 680px; margin: 0 auto; }

.back-link {
  display: inline-block;
  font-size: 0.78rem; letter-spacing: 0.2em;
  color: var(--gold2); text-decoration: none; text-transform: uppercase;
  margin-bottom: 24px; opacity: 0.7; transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

.header { text-align: center; margin-bottom: 28px; border-radius: 4px; overflow: hidden; }

.header-bg::before {

.header-tag {
  display: inline-block; font-size: 10px; font-weight: 700;

  color: var(--gold2); border: 1px solid rgba(201,168,76,0.4);
  padding: 4px 16px; margin-bottom: 14px;
}
.header-star-row { display: flex; justify-content: center; gap: 14px; margin-bottom: 12px; }
.header-star-row span { color: var(--gold); font-size: 10px; opacity: 0.7; }
.header-star-row span.lg { font-size: 16px; opacity: 1; }
.header h1 {
  font-size: clamp(22px, 6vw, 32px); font-weight: 900;
  letter-spacing: 2px; color: var(--white); margin-bottom: 8px; line-height: 1.3;
}
.header h1 .accent {
  background: linear-gradient(135deg, var(--gold3), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .sub { font-size: 12px; color: rgba(201,168,76,0.8); line-height: 1.9; }
.header-stripe { height: 3px; background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent); }

.two-card-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;
}
@media (max-width: 480px) { .two-card-row { grid-template-columns: 1fr; } }

.persona-card {

  border-radius: 12px; padding: 20px 18px; position: relative; overflow: hidden;
}
.persona-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
