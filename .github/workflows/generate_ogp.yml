name: Generate OGP Pages

on:
  workflow_dispatch:
  push:
    paths:
      - 'images/screenshots/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generator
        run: python generate_ogp_pages.py

      - name: Commit generated pages
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add screenshot/
          git diff --staged --quiet || git commit -m "Generate OGP pages"
          git push
