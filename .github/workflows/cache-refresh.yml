name: Refresh Screenshot Cache

on:
  schedule:
    - cron: '0 */6 * * *'   # 6時間ごと（UTC 0:00 / 6:00 / 12:00 / 18:00）
  workflow_dispatch:          # 手動実行も可能

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Count screenshots
        id: count
        run: |
          COUNT=$(ls images/screenshots/sshot_*.png 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT screenshots"

      - name: Update cache-version.json
        run: |
          VERSION=$(date -u +%Y%m%d%H%M)
          echo "{\"version\":\"$VERSION\",\"total\":${{ steps.count.outputs.count }},\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > cache-version.json
          cat cache-version.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cache-version.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: refresh cache $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
