<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番組スケジュール — JAYBIRDS</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000000;
  --card: #1c1c1e;
  --card2: #2c2c2e;
  --border: #38383a;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold3: #f5e0a0;
  --white: #ffffff;
  --label: #ebebf5;
  --label2: rgba(235,235,245,0.65);
  --muted: rgba(235,235,245,0.4);
  --c-group: #4a9fd4;
  --c-group-bg: rgba(74,159,212,0.15);
  --c-position: #a78bfa;
  --c-position-bg: rgba(167,139,250,0.15);
  --c-concept: #fbbf24;
  --c-concept-bg: rgba(251,191,36,0.15);
  --c-debut: #34d399;
  --c-debut-bg: rgba(52,211,153,0.15);
  --c-vote: #fb7185;
  --c-vote-bg: rgba(251,113,133,0.15);
  --c-rank: #94a3b8;
  --c-rank-bg: rgba(148,163,184,0.15);
}

body {
  background: var(--bg);
  color: var(--label);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  line-height: 1.7;
  min-height: 100vh;
}

.back-wrap { padding: 28px 20px 0; max-width: 720px; margin: 0 auto; }
.back-link {
  display: inline-block; font-size: 0.78rem; letter-spacing: 0.2em;
  color: var(--gold2); text-decoration: none; text-transform: uppercase;
  opacity: 0.7; transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

.header { text-align: center; margin: 24px auto 0; border-radius: 4px; overflow: hidden; max-width: 720px; }
.header-bg {
  background: linear-gradient(160deg, #000000 0%, #0a1a3a 45%, #1a4fa0 80%, #3a7fd4 100%);
  padding: 40px 32px 32px; position: relative; overflow: hidden;
}
.header-bg::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px; border: 2px solid rgba(201,168,76,0.2); transform: rotate(45deg);
}
.header-bg::after {
  content: ''; position: absolute; bottom: -30px; left: -30px;
  width: 130px; height: 130px; border: 2px solid rgba(201,168,76,0.15); transform: rotate(45deg);
}
.header-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold2); border: 1px solid rgba(201,168,76,0.4);
  padding: 4px 16px; margin-bottom: 14px;
}
.header-star-row { display: flex; justify-content: center; gap: 14px; margin-bottom: 12px; }
.header-star-row span { color: var(--gold); font-size: 10px; opacity: 0.7; }
.header-star-row span.lg { font-size: 16px; opacity: 1; }
.header h1 {
  font-size: clamp(20px, 5vw, 28px); font-weight: 900;
  color: var(--white); margin-bottom: 8px; line-height: 1.3; letter-spacing: 1px;
}
.header h1 em {
  background: linear-gradient(135deg, var(--gold3), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  font-style: normal;
}
.header .sub { font-size: 12px; color: var(--label2); line-height: 1.85; max-width: 500px; margin: 0 auto 16px; }
.h-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
.h-chip {
  background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold2); font-size: 11px; padding: 4px 14px; border-radius: 2px;
}
.header-stripe { height: 4px; background: linear-gradient(90deg, #000, #1a4fa0, #3a7fd4, var(--gold), #000); }

.outer { max-width: 720px; margin: 0 auto; padding: 0 20px; }

.legend {
  background: var(--card); border: 1px solid var(--border);
  padding: 12px 16px; margin: 16px 0 0;
  display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center;
  border-radius: 8px;
}
.leg-lbl { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--label2); }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

.disc {
  background: rgba(201,168,76,0.07); border: 1px solid rgba(201,168,76,0.2);
  border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0;
  padding: 12px 16px; margin: 14px 0 0;
  font-size: 11px; color: var(--label2); line-height: 1.8;
}
.disc strong { color: var(--gold2); }

/* ===== タイムラインラッパー ===== */
.tl-wrap {
  position: relative;
  margin-top: 24px;
  padding-right: 36px; /* バー1本分 */
}

/* ===== 投票バー（JS描画） ===== */
.vote-bar {
  position: absolute;
  right: 0;
  width: 14px;
  pointer-events: none;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.vb-cap-top {
  width: 14px; height: 7px;
  border-radius: 7px 7px 0 0;
  flex-shrink: 0;
}
.vb-mid { width: 14px; flex: 1; }
.vb-cap-bottom {
  width: 14px; height: 7px;
  border-radius: 0 0 7px 7px;
  flex-shrink: 0;
}

.c11 .vb-cap-top, .c11 .vb-mid, .c11 .vb-cap-bottom {
  background: linear-gradient(180deg, #be123c 0%, #fb7185 100%);
}
.c2 .vb-cap-top, .c2 .vb-mid, .c2 .vb-cap-bottom {
  background: linear-gradient(180deg, #9f1239 0%, #e11d48 100%);
}
.c1 .vb-cap-top, .c1 .vb-mid, .c1 .vb-cap-bottom {
  background: linear-gradient(180deg, #7f1d1d 0%, #dc2626 100%);
}
.cdbl .vb-cap-top, .cdbl .vb-mid, .cdbl .vb-cap-bottom {
  background: linear-gradient(180deg, #d97706 0%, #fbbf24 100%);
}

.vb-label {
  position: absolute;
  left: -34px;
  top: 50%;
  transform: translateY(-50%);
  writing-mode: vertical-rl;
  font-size: 7.5px;
  font-weight: 700;
  color: var(--muted);
  white-space: nowrap;
  letter-spacing: 1px;
  pointer-events: none;
}

/* ===== PHASE ===== */
.phase { margin-bottom: 28px; }
.ph-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.ph-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 700; color: rgba(201,168,76,0.2); line-height: 1; min-width: 28px;
}
.ph-name { font-size: 12px; font-weight: 700; color: var(--gold2); letter-spacing: 1px; }
.ph-line { flex: 1; height: 1px; background: rgba(201,168,76,0.2); }

.ep { display: grid; grid-template-columns: 54px 1fr; position: relative; }
.ep::before {
  content: ''; position: absolute; left: 26px; top: 0; bottom: 0;
  width: 1px; background: rgba(201,168,76,0.15); z-index: 0;
}
.ep:last-child::before { display: none; }
.ep-dc {
  display: flex; flex-direction: column; align-items: center;
  padding-top: 14px; position: relative; z-index: 1;
}
.ep-dot {
  width: 11px; height: 11px; border-radius: 50%;
  background: var(--bg); border: 2px solid rgba(201,168,76,0.3);
  flex-shrink: 0; margin-bottom: 4px;
}
.ep-dot.a { border-color: var(--gold); background: var(--gold); width: 13px; height: 13px; }
.ep-dot.v { border-color: var(--c-vote); background: var(--c-vote); width: 13px; height: 13px; }
.ep-dot.f {
  width: 18px; height: 18px; background: var(--gold); border-color: var(--gold);
  box-shadow: 0 0 0 4px rgba(201,168,76,0.2);
}
.ep-date { font-size: 9px; color: var(--muted); text-align: center; line-height: 1.3; white-space: nowrap; }
.ep-date strong { display: block; font-size: 12px; font-weight: 700; color: var(--label); }
.ep-body { padding: 10px 0 16px 12px; }

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
}
.card + .card { margin-top: 8px; }
.card-ep { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.card-ttl { font-size: 13px; font-weight: 700; color: var(--label); margin-bottom: 4px; }
.card-txt { font-size: 11px; color: var(--label2); line-height: 1.75; }
.card-txt strong { color: var(--label); }

.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
.tag { display: inline-flex; align-items: center; font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.tg  { background: var(--c-group-bg);    color: var(--c-group); }
.tp  { background: var(--c-position-bg); color: var(--c-position); }
.tc  { background: var(--c-concept-bg);  color: var(--c-concept); }
.td  { background: var(--c-debut-bg);    color: var(--c-debut); }
.tv  { background: var(--c-vote-bg);     color: var(--c-vote); }
.tr  { background: var(--c-rank-bg);     color: var(--c-rank); }
.tf  { background: rgba(251,191,36,0.15); color: var(--gold2); }

.vbadge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--c-vote-bg); border: 1px solid rgba(251,113,133,0.25);
  color: var(--c-vote); font-size: 10.5px; font-weight: 700;
  padding: 5px 12px; border-radius: 6px; margin-top: 7px;
}

.info-box {
  background: rgba(201,168,76,0.07); border: 1px solid rgba(201,168,76,0.2);
  border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0;
  padding: 10px 14px; margin-top: 8px;
  font-size: 11px; color: var(--label2); line-height: 1.8;
}
.info-box strong { color: var(--gold2); }
.info-box-title { font-size: 11px; font-weight: 700; color: var(--gold2); margin-bottom: 4px; }
