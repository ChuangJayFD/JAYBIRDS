  };

  async function loadManifest() {
    try {
      const res = await fetch(MANIFEST_URL);
      const manifest = await res.json();
      allImages = [];
      const epTabs = document.getElementById('epTabs');

      for (const ep of manifest.episodes) {
        // エピソードボタンを追加
        const btn = document.createElement('button');
        btn.className = 'ep-tab';
        btn.textContent = ep.label;
        btn.onclick = function() { setEp(ep.number, this); };
        epTabs.appendChild(btn);

        // 画像リストに追加
        for (let i = 0; i < ep.images.length; i++) {
          allImages.push({
            ep: ep.number,
            epLabel: ep.label,
            idx: i + 1,
            path: ep.images[i],
            pageId: `ep${String(ep.number).padStart(2,'0')}_${String(i+1).padStart(3,'0')}`
          });
        }
      }
      rollImage();
    } catch(e) {
      console.error('Manifest load error:', e);
    }
  }

  function getPool() {
    if (currentEp === 'all') return allImages;
    return allImages.filter(img => img.ep === Number(currentEp));
  }

  function rollImage() {
    const pool = getPool();
    if (!pool.length) return;
    let nextIdx;
    do {
      nextIdx = Math.floor(Math.random() * pool.length);
    } while (pool.length > 1 && pool[nextIdx] === currentImage);
    currentImage = pool[nextIdx];

    const img = document.getElementById('screenshotImg');
    const badge = document.getElementById('imgBadge');
    const placeholder = document.getElementById('placeholder');

    img.classList.add('loading');
    placeholder.style.display = 'flex';
    img.onload = () => { img.classList.remove('loading'); placeholder.style.display = 'none'; };
    img.onerror = () => { placeholder.style.display = 'flex'; };
    img.src = `${BASE_URL}/images/screenshots/${currentImage.path}`;
    badge.textContent = `${currentImage.epLabel} No.${String(currentImage.idx).padStart(3,'0')}`;

    updateTweetBtn();
    gtag('event', 'screenshot_roll', { ep: currentImage.ep, idx: currentImage.idx });
  }

  function setEp(ep, btn) {
    currentEp = ep;
    document.querySelectorAll('.ep-tab').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    rollImage();
  }

  function setLang(lang, btn) {
    currentLang = lang;
    document.querySelectorAll('.lang-tab').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
    updateTweetBtn();
  }

  function updateTweetBtn() {
    if (!currentImage) return;
    const text = tweetTexts[currentLang](currentImage);
    document.getElementById('tweetPreview').textContent = text;
    const encoded = encodeURIComponent(text);
    document.getElementById('tweetBtn').href = `https://twitter.com/intent/tweet?text=${encoded}`;
  }

  document.getElementById('tweetBtn').addEventListener('click', () => {
    gtag('event', 'screenshot_tweet', { ep: currentImage?.ep, lang: currentLang });
  });

  loadManifest();
</script>

</body>
</html>
