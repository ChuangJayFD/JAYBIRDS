<script>
  // ===== 設定 =====
  const BASE_URL = 'https://chuangjayfd.github.io/JAYBIRDS';
  const IMG_PATH = `${BASE_URL}/images/screenshots/`;
  const OGP_PATH = `${BASE_URL}/screenshot/`;

  // ===== State =====
  let currentIndex = null;
  let currentLang = 'ja';
  let TOTAL = 30;
  let cacheVer = '';

  // ===== ツイート文面 =====
  const tweetTexts = {
    ja: (n) => `ジュアンジェイのスクショ引いた💙🪶\n#ジュアンジェイ #JAYどこ #FINDJAY #PRODUCE101JAPAN新世界\n${BASE_URL}/screenshot/${n}.html`,
    en: (n) => `Drew a Chuang Jay screenshot 💙🪶\n#ChuangJay #JAYどこ #FINDJAY #PRODUCE101JAPAN新世界\n${BASE_URL}/screenshot/${n}.html`,
    zh: (n) => `抽到莊傑的截圖 💙🪶\n#莊傑 #JAYどこ #FINDJAY #PRODUCE101JAPAN新世界\n${BASE_URL}/screenshot/${n}.html`,
    ko: (n) => `Chuang Jay 스크린샷 뽑았어요 💙🪶\n#ChuangJay #JAYどこ #FINDJAY #PRODUCE101JAPAN新世界\n${BASE_URL}/screenshot/${n}.html`,
  };

  // ===== 初期化：cache-version.json を取得してからスタート =====
  fetch(`${BASE_URL}/cache-version.json?t=${Date.now()}`)
    .then(r => r.json())
    .then(data => {
      if (data.total) TOTAL = data.total;
      if (data.version) cacheVer = data.version;
    })
    .catch(() => {})
    .finally(() => rollImage());

  function rollImage() {
    let next;
    do { next = Math.floor(Math.random() * TOTAL) + 1; } while (next === currentIndex && TOTAL > 1);
    currentIndex = next;

    const img = document.getElementById('screenshotImg');
    const badge = document.getElementById('imgBadge');
    const placeholder = document.getElementById('placeholder');

    img.classList.add('loading');
    placeholder.style.display = 'flex';

    img.onload = () => {
      img.classList.remove('loading');
      placeholder.style.display = 'none';
    };
    img.onerror = () => {
      // 画像がまだない場合はプレースホルダー表示
      placeholder.style.display = 'flex';
    };
    const filename = `sshot_${String(currentIndex).padStart(2, '0')}.png`;
    img.src = `${IMG_PATH}${filename}${cacheVer ? '?v=' + cacheVer : ''}`;
    badge.textContent = `No.${String(currentIndex).padStart(2, '0')}`;

    updateTweetBtn();

    // GA4イベント
    gtag('event', 'screenshot_roll', { image_index: currentIndex });
  }

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-tab').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    updateTweetBtn();
  }

  function updateTweetBtn() {
    if (!currentIndex) return;
    const text = tweetTexts[currentLang](currentIndex);
    document.getElementById('tweetPreview').textContent = text;

    const encoded = encodeURIComponent(text);
    document.getElementById('tweetBtn').href = `https://twitter.com/intent/tweet?text=${encoded}`;
  }

  // ツイートクリックGA4
  document.getElementById('tweetBtn').addEventListener('click', () => {
    gtag('event', 'screenshot_tweet', {
      image_index: currentIndex,
      lang: currentLang
    });
  });
</script>

</body>
</html>
