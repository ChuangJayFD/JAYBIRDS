<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide — JAYBIRDS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a1f2e;
      --navy-mid: #222840;
      --gold: #c9a84c;
      --gold-light: #e2c97e;
      --gold-pale: #f0e4b8;
      --cream: #f5f0e8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--navy);
      color: var(--cream);
      font-family: 'Noto Serif JP', serif;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 48px 24px 32px;
    }
    .back-link {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      color: var(--gold-light);
      text-decoration: none;
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }
    .site-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: var(--gold-light);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.7;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: var(--gold-pale);
      opacity: 0.75;
      margin-bottom: 40px;
    }
    .divider {
      width: 60px;
      border: none;
      border-top: 1px solid var(--gold);
      margin: 0 auto 40px;
      opacity: 0.4;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px 80px;
      display: grid;
      gap: 14px;
    }
    .card {
      display: block;
      text-decoration: none;
      background: var(--navy-mid);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 26px 28px;
      position: relative;
      transition: border-color 0.25s, background 0.25s;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px solid rgba(201,168,76,0.08);
      pointer-events: none;
      transition: border-color 0.25s;
    }
    .card:hover {
      background: #272d42;
      border-color: rgba(201,168,76,0.7);
    }
    .card:hover::before { border-color: rgba(201,168,76,0.2); }
    .card.disabled {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }
    .card-inner {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .card-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 40px;
      text-align: center;
    }
    .card-en {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.95rem, 3vw, 1.15rem);
      letter-spacing: 0.18em;
      color: var(--gold);
      display: block;
      margin-bottom: 3px;
    }
    .card-ja {
      font-size: clamp(0.7rem, 2vw, 0.78rem);
      color: var(--gold-pale);
      letter-spacing: 0.1em;
      opacity: 0.8;
    }
    .card-badge {
      margin-left: auto;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: var(--gold-light);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 2px 8px;
      flex-shrink: 0;
      opacity: 0.6;
    }
    .card-arrow {
      margin-left: auto;
      color: var(--gold);
      opacity: 0.5;
      font-size: 1rem;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.2s;
    }
    .card:hover .card-arrow { opacity: 1; transform: translateX(4px); }
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid rgba(201,168,76,0.1);
    }
    footer p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--gold-light);
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-link">← Home</a>
    <p class="site-label">JAYBIRDS</p>
    <h1>Guide</h1>
    <p class="subtitle">応援ガイドまとめ</p>
    <hr class="divider">
  </header>

  <main>

    <a href="smingparty.html" class="card">
      <div class="card-inner">
        <div class="card-icon">🎉</div>
        <div class="card-text">
          <span class="card-en">Sming Party Guide</span>
          <span class="card-ja">スミンパーティーガイド</span>
        </div>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <a href="FanCamGuide.html" class="card">
      <div class="card-inner">
        <div class="card-icon">🎥</div>
        <div class="card-text">
          <span class="card-en">FanCam Guide</span>
          <span class="card-ja">チッケム再生ガイド</span>
        </div>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <a href="TikTokGuide.html" class="card">
      <div class="card-inner">
        <div class="card-icon">🎵</div>
        <div class="card-text">
          <span class="card-en">TikTok Guide</span>
          <span class="card-ja">TikTok応援ガイド</span>
        </div>
        <span class="card-arrow">→</span>
      </div>
    </a>

    <div class="card disabled">
      <div class="card-inner">
        <div class="card-icon">🏷️</div>
        <div class="card-text">
          <span class="card-en">Tag Event Guide</span>
          <span class="card-ja">タグイベガイド</span>
        </div>
        <span class="card-badge">Coming Soon</span>
      </div>
    </div>

  </main>

  <footer>
    <p>JAYBIRDS — Chuang Jay Fan Support Account</p>
  </footer>

</body>
</html>
