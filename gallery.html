<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — JAYBIRDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a1f2e;
  --navy-mid: #222840;
  --gold: #c9a84c;
  --gold-light: #e2c97e;
  --gold-pale: #f0e4b8;
  --cream: #f5f0e8;
  --border: rgba(201,168,76,0.3);
  --border2: rgba(201,168,76,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--navy);
  color: var(--cream);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  padding: 40px 20px 80px;
}

.wrapper { max-width: 720px; margin: 0 auto; }

.back-link {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.78rem; letter-spacing: 0.25em;
  color: var(--gold-light); text-decoration: none; text-transform: uppercase;
  margin-bottom: 28px; opacity: 0.7; transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

header { text-align: center; margin-bottom: 40px; }
.site-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.72rem; letter-spacing: 0.35em;
  color: var(--gold-light); text-transform: uppercase;
  margin-bottom: 10px; opacity: 0.7;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 8vw, 3.2rem); font-weight: 300;
  letter-spacing: 0.2em; color: var(--gold); margin-bottom: 8px;
}
.subtitle {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 0.9rem; letter-spacing: 0.15em;
  color: var(--gold-pale); opacity: 0.75;
}
.divider { width: 60px; border: none; border-top: 1px solid var(--gold); margin: 16px auto 0; opacity: 0.4; }

.section { margin-bottom: 40px; }
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.7rem, 2vw, 0.82rem);
  letter-spacing: 0.35em; color: var(--gold); text-transform: uppercase;
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--gold); opacity: 0.2; }

.section-note {
  font-size: 0.68rem; color: var(--gold-pale); opacity: 0.5;
  letter-spacing: 0.08em; margin-bottom: 6px; line-height: 1.8;
}
.section-note-highlight {
  font-size: 0.68rem; color: var(--gold-light); opacity: 0.75;
  letter-spacing: 0.08em; margin-bottom: 12px; line-height: 1.8;
}

/* ===== アイコンフレーム ===== */
.frame-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 16px;
  margin-bottom: 16px;
}

.frame-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 10px;
}

.frame-img-wrap {
  width: 100%; aspect-ratio: 1 / 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  padding: 8px;
}
.frame-img-wrap img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  -webkit-touch-callout: default;
}

.frame-link {
  display: inline-flex; align-items: center; gap: 6px;
  text-decoration: none;
  background: linear-gradient(180deg, #f0d472 0%, #d4a830 55%, #b8901e 100%);
  border-radius: 6px; padding: 7px 14px;
  font-size: 0.68rem; font-weight: 700;
  color: #1a0e00; letter-spacing: 0.1em;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 3px 0 #7a5a0a, 0 5px 10px rgba(0,0,0,0.3);
  transition: transform 0.1s, filter 0.1s;
  width: 100%; justify-content: center;
}
.frame-link:hover { filter: brightness(1.06); transform: translateY(-1px); }
.frame-link:active { transform: translateY(2px); }

.frame-credit {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.6rem; letter-spacing: 0.15em;
  color: var(--gold-pale); opacity: 0.5;
  text-align: center;
}

/* ===== X風グリッド ===== */
.x-grid-2x2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  overflow: hidden;
}

.x-item {
  overflow: hidden;
  background: var(--navy-mid);
  cursor: pointer;
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 8px;
}
.x-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  transition: transform 0.2s;
  -webkit-touch-callout: default;
}
.x-item:hover img { transform: scale(1.03); }
.x-item::after {
  content: '▶ TAP';
  position: absolute; bottom: 6px; right: 8px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.55rem; letter-spacing: 0.15em;
  color: rgba(255,255,255,0.6);
  background: rgba(0,0,0,0.35);
  padding: 2px 6px; border-radius: 3px;
  pointer-events: none;
}

/* ===== ライトボックス ===== */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.93); z-index: 1000;
  align-items: center; justify-content: center;
}
.lightbox.active { display: flex; }
.lightbox-img-wrap {
  max-width: 92vw; max-height: 88vh;
  display: flex; align-items: center; justify-content: center;
}
.lightbox-img-wrap img {
  max-width: 92vw; max-height: 82vh;
  object-fit: contain; display: block; border-radius: 4px;
  -webkit-touch-callout: default;
}
.lightbox-close {
  position: fixed; top: 16px; right: 20px;
  font-size: 1.8rem; color: var(--gold-light);
  cursor: pointer; opacity: 0.7; z-index: 1001;
  background: none; border: none; line-height: 1;
}
.lightbox-close:hover { opacity: 1; }
.lightbox-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  font-size: 2rem; color: var(--gold-light);
  cursor: pointer; opacity: 0.6; z-index: 1001;
  background: rgba(0,0,0,0.4); border: none;
  padding: 12px 10px; line-height: 1; border-radius: 4px;
  transition: opacity 0.2s;
}
.lightbox-nav:hover { opacity: 1; }
.lightbox-prev { left: 8px; }
.lightbox-next { right: 8px; }
.lightbox-counter {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.75rem; letter-spacing: 0.2em; color: var(--gold-light); opacity: 0.6;
}
.lightbox-hint {
  position: fixed; bottom: 38px; left: 50%; transform: translateX(-50%);
  font-size: 0.6rem; letter-spacing: 0.15em;
  color: var(--gold-pale); opacity: 0.4; white-space: nowrap;
}

footer {
  text-align: center; padding: 24px;
  border-top: 1px solid var(--border2); margin-top: 20px;
}
footer p {
  font-family: 'Cormorant Garamond', serif; font-size: 0.68rem;
  letter-spacing: 0.2em; color: var(--gold-light); opacity: 0.4;
}
</style>
</head>
<body>
<div class="wrapper">

  <a href="index.html" class="back-link">← Home</a>

  <header>
    <p class="site-label">JAYBIRDS</p>
    <h1>Gallery</h1>
    <p class="subtitle">布教画像・配布素材</p>
    <hr class="divider">
  </header>

  <!-- アイコンフレーム -->
  <div class="section">
    <p class="section-title">✦ アイコンフレーム</p>
    <p class="section-note">アイコンデコッターでアイコンに使えるフレームです。ボタンから使ってね！</p>
    <div class="frame-grid">
      <div class="frame-item">
        <div class="frame-img-wrap">
          <img src="frame01.PNG" alt="ジュアンジェイ応援フレーム" loading="lazy">
        </div>
        <a class="frame-link" href="https://icondecotter.jp/detail.php?id=107098" target="_blank" rel="noopener">
          🪶 フレームを使う
        </a>
        <p class="frame-credit">by JAYBIRDS</p>
      </div>
    </div>
  </div>

  <!-- X布教画像 -->
  <div class="section">
    <p class="section-title">✦ X布教画像</p>
    <p class="section-note">Xへの投稿・拡散用の布教素材です。</p>
    <p class="section-note-highlight">✦ 画像は一部だけ表示されています。タップすると全ての情報が確認できます。長押しで保存。</p>
    <div class="x-grid-2x2">
      <div class="x-item" onclick="openLightbox('fukyo01', 0)">
        <img src="fukyo01_01.JPG" alt="布教画像1" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 1)">
        <img src="fukyo01_02.JPG" alt="布教画像2" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 2)">
        <img src="fukyo01_03.JPG" alt="布教画像3" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 3)">
        <img src="fukyo01_04.JPG" alt="布教画像4" loading="lazy">
      </div>
    </div>
  </div>

</div>

<footer>
  <p>JAYBIRDS — Chuang Jay Fan Support Account</p>
</footer>

<div class="lightbox" id="lightbox" onclick="closeLightboxOutside(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1)">‹</button>
  <div class="lightbox-img-wrap">
    <img id="lightbox-img" src="" alt="">
  </div>
  <button class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1)">›</button>
  <div class="lightbox-hint">長押しで保存できます</div>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<script>
const galleries = {
  fukyo01: [
    'fukyo01_01.JPG',
    'fukyo01_02.JPG',
    'fukyo01_03.JPG',
    'fukyo01_04.JPG'
  ]
};

let currentGallery = null;
let currentIndex = 0;

function openLightbox(galleryId, index) {
  currentGallery = galleryId;
  currentIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const imgs = galleries[currentGallery];
  document.getElementById('lightbox-img').src = imgs[currentIndex];
  document.getElementById('lightbox-counter').textContent =
    (currentIndex + 1) + ' / ' + imgs.length;
}

function navigateLightbox(dir) {
  const imgs = galleries[currentGallery];
  currentIndex = (currentIndex + dir + imgs.length) % imgs.length;
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function closeLightboxOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) navigateLightbox(diff > 0 ? 1 : -1);
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'ArrowRight') navigateLightbox(1);
  if (e.key === 'ArrowLeft') navigateLightbox(-1);
  if (e.key === 'Escape') closeLightbox();
});
</script>

</body>
</html>
