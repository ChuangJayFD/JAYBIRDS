<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — JAYBIRDS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a1f2e;
  --navy-mid: #222840;
  --navy-light: #2a3254;
  --gold: #c9a84c;
  --gold-light: #e2c97e;
  --gold-pale: #f0e4b8;
  --cream: #f5f0e8;
  --border: rgba(201,168,76,0.3);
  --border2: rgba(201,168,76,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--navy);
  color: var(--cream);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  padding: 40px 20px 80px;
}

.wrapper { max-width: 720px; margin: 0 auto; }

.back-link {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.78rem; letter-spacing: 0.25em;
  color: var(--gold-light); text-decoration: none; text-transform: uppercase;
  margin-bottom: 28px; opacity: 0.7; transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

/* ===== HEADER ===== */
header { text-align: center; margin-bottom: 40px; }
.site-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.72rem; letter-spacing: 0.35em;
  color: var(--gold-light); text-transform: uppercase;
  margin-bottom: 10px; opacity: 0.7;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 8vw, 3.2rem); font-weight: 300;
  letter-spacing: 0.2em; color: var(--gold); margin-bottom: 8px;
}
.subtitle {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 0.9rem; letter-spacing: 0.15em;
  color: var(--gold-pale); opacity: 0.75; margin-bottom: 8px;
}
.divider { width: 60px; border: none; border-top: 1px solid var(--gold); margin: 16px auto 0; opacity: 0.4; }

/* ===== SECTION ===== */
.section { margin-bottom: 40px; }
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.7rem, 2vw, 0.82rem);
  letter-spacing: 0.35em; color: var(--gold);
  text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--gold); opacity: 0.2; }

.section-note {
  font-size: 0.7rem; color: var(--gold-pale); opacity: 0.55;
  letter-spacing: 0.05em; margin-bottom: 14px; line-height: 1.8;
}

/* ===== X風グリッド（布教画像） ===== */
.x-grid {
  display: grid;
  gap: 3px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}

/* 4枚レイアウト：上1枚大 + 下3枚 */
.x-grid-4 {
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
}
.x-grid-4 .x-item:nth-child(1) {
  grid-column: 1 / 2;
  grid-row: 1 / 2;
}
.x-grid-4 .x-item:nth-child(2) {
  grid-column: 2 / 3;
  grid-row: 1 / 2;
}
.x-grid-4 .x-item:nth-child(3) {
  grid-column: 1 / 2;
  grid-row: 2 / 3;
}
.x-grid-4 .x-item:nth-child(4) {
  grid-column: 2 / 3;
  grid-row: 2 / 3;
}

.x-item {
  overflow: hidden;
  background: var(--navy-mid);
  aspect-ratio: 9/16;
  position: relative;
}
.x-item img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform 0.2s;
  -webkit-touch-callout: default;
}
.x-item:hover img { transform: scale(1.02); }

/* ===== 通常グリッド（アイコンフレーム等） ===== */
.normal-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

.normal-item {
  background: var(--navy-mid);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}
.normal-item img {
  width: 100%; display: block;
  -webkit-touch-callout: default;
}
.normal-item-label {
  padding: 8px 10px;
  font-size: 0.65rem; letter-spacing: 0.1em;
  color: var(--gold-pale); opacity: 0.7;
  font-family: 'Cormorant Garamond', serif;
}

/* ===== ライトボックス ===== */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  align-items: center; justify-content: center;
  flex-direction: column;
}
.lightbox.active { display: flex; }

.lightbox-inner {
  position: relative;
  max-width: 92vw; max-height: 88vh;
  display: flex; align-items: center; justify-content: center;
}

.lightbox img {
  max-width: 92vw; max-height: 82vh;
  object-fit: contain; display: block;
  border-radius: 4px;
  -webkit-touch-callout: default;
}

.lightbox-close {
  position: fixed; top: 16px; right: 20px;
  font-size: 1.8rem; color: var(--gold-light);
  cursor: pointer; opacity: 0.7; z-index: 1001;
  background: none; border: none; line-height: 1;
}
.lightbox-close:hover { opacity: 1; }

.lightbox-nav {
  position: fixed;
  top: 50%; transform: translateY(-50%);
  font-size: 1.8rem; color: var(--gold-light);
  cursor: pointer; opacity: 0.6; z-index: 1001;
  background: rgba(0,0,0,0.4); border: none;
  padding: 12px 10px; line-height: 1;
  border-radius: 4px;
  transition: opacity 0.2s;
}
.lightbox-nav:hover { opacity: 1; }
.lightbox-prev { left: 8px; }
.lightbox-next { right: 8px; }

.lightbox-counter {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.75rem; letter-spacing: 0.2em;
  color: var(--gold-light); opacity: 0.6;
}

.lightbox-hint {
  position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
  font-size: 0.62rem; letter-spacing: 0.15em;
  color: var(--gold-pale); opacity: 0.4;
  white-space: nowrap;
}

/* ===== FOOTER ===== */
footer {
  text-align: center; padding: 24px;
  border-top: 1px solid var(--border2); margin-top: 20px;
}
footer p {
  font-family: 'Cormorant Garamond', serif; font-size: 0.68rem;
  letter-spacing: 0.2em; color: var(--gold-light); opacity: 0.4;
}
</style>
</head>
<body>
<div class="wrapper">

  <a href="index.html" class="back-link">← Home</a>

  <header>
    <p class="site-label">JAYBIRDS</p>
    <h1>Gallery</h1>
    <p class="subtitle">布教画像・配布素材</p>
    <hr class="divider">
  </header>

  <!-- 布教画像 -->
  <div class="section">
    <p class="section-title">✦ 布教画像</p>
    <p class="section-note">タップで拡大 · 長押しで保存</p>
    <div class="x-grid x-grid-4" id="fukyo01">
      <div class="x-item" onclick="openLightbox('fukyo01', 0)">
        <img src="fukyo01_01.JPG" alt="布教画像1" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 1)">
        <img src="fukyo01_02.JPG" alt="布教画像2" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 2)">
        <img src="fukyo01_03.JPG" alt="布教画像3" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 3)">
        <img src="fukyo01_04.JPG" alt="布教画像4" loading="lazy">
      </div>
    </div>
  </div>

  <!-- 素材エリア（今後追加用） -->
  <!-- 例：アイコンフレームを追加するときは以下のブロックをコピーして使う
  <div class="section">
    <p class="section-title">✦ アイコンフレーム</p>
    <p class="section-note">長押しで保存</p>
    <div class="normal-grid">
      <div class="normal-item">
        <img src="frame01.png" alt="フレーム1" loading="lazy">
        <div class="normal-item-label">フレーム · @作成者名</div>
      </div>
    </div>
  </div>
  -->

</div>

<footer>
  <p>JAYBIRDS — Chuang Jay Fan Support Account</p>
</footer>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOutside(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1)">‹</button>
  <div class="lightbox-inner">
    <img id="lightbox-img" src="" alt="">
  </div>
  <button class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1)">›</button>
  <div class="lightbox-hint">長押しで保存できます</div>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<script>
const galleries = {
  fukyo01: [
    'fukyo01_01.JPG',
    'fukyo01_02.JPG',
    'fukyo01_03.JPG',
    'fukyo01_04.JPG'
  ]
};

let currentGallery = null;
let currentIndex = 0;

function openLightbox(galleryId, index) {
  currentGallery = galleryId;
  currentIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const imgs = galleries[currentGallery];
  document.getElementById('lightbox-img').src = imgs[currentIndex];
  document.getElementById('lightbox-counter').textContent =
    (currentIndex + 1) + ' / ' + imgs.length;
}

function navigateLightbox(dir) {
  const imgs = galleries[currentGallery];
  currentIndex = (currentIndex + dir + imgs.length) % imgs.length;
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function closeLightboxOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

// スワイプ対応
let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) navigateLightbox(diff > 0 ? 1 : -1);
});

// キーボード対応
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'ArrowRight') navigateLightbox(1);
  if (e.key === 'ArrowLeft') navigateLightbox(-1);
  if (e.key === 'Escape') closeLightbox();
});
</script>

</body>
</html>
