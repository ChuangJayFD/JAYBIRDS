<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — JAYBIRDS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0e1420;
  --bg2: #131926;
  --card: #1a2035;
  --card2: #222840;
  --border: rgba(201,168,76,0.25);
  --border2: rgba(201,168,76,0.1);
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold3: #f5e0a0;
  --white: #ffffff;
  --label: #ebebf5;
  --label2: rgba(235,235,245,0.65);
  --muted: rgba(235,235,245,0.4);
  --green: #30d158;
  --danger: #ff453a;
}

body {
  background: var(--bg);
  color: var(--label);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  padding: 40px 20px 80px;
}

.wrapper { max-width: 720px; margin: 0 auto; }

.back-link {
  display: inline-block;
  font-size: 0.78rem; letter-spacing: 0.2em;
  color: var(--gold2); text-decoration: none; text-transform: uppercase;
  margin-bottom: 24px; opacity: 0.7; transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

/* ===== HEADER ===== */
.header { text-align: center; margin-bottom: 32px; border-radius: 4px; overflow: hidden; }
.header-bg {
  background: linear-gradient(160deg, #0a0f1e 0%, #0f1d36 45%, #1a2f52 80%, #243a6a 100%);
  padding: 40px 32px 32px; position: relative; overflow: hidden;
}
.header-bg::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px;
  border: 2px solid rgba(201,168,76,0.15); transform: rotate(45deg);
}
.header-bg::after {
  content: ''; position: absolute; bottom: -30px; left: -30px;
  width: 130px; height: 130px;
  border: 2px solid rgba(201,168,76,0.1); transform: rotate(45deg);
}
.header-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  letter-spacing: 4px; text-transform: uppercase;
  color: var(--gold2); border: 1px solid rgba(201,168,76,0.4);
  padding: 4px 16px; margin-bottom: 16px; position: relative;
}
.header-star-row {
  display: flex; justify-content: center; gap: 14px; margin-bottom: 14px;
}
.header-star-row span { color: var(--gold); font-size: 10px; opacity: 0.7; }
.header-star-row span.lg { font-size: 16px; opacity: 1; }
.header h1 {
  font-size: clamp(28px, 8vw, 44px); font-weight: 900;
  letter-spacing: 4px; color: var(--white); margin-bottom: 8px;
}
.header h1 .accent {
  background: linear-gradient(135deg, var(--gold3), var(--gold), var(--white));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .sub { font-size: 12px; color: rgba(201,168,76,0.8); line-height: 1.9; }
.header-stripe { height: 3px; background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent); }

/* ===== SECTION ===== */
.section { margin-bottom: 36px; }

.section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); opacity: 0.85; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::before { content: '✦'; font-size: 9px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--gold); opacity: 0.2; }

.section-note {
  font-size: 12px; color: var(--label2); line-height: 1.8;
  margin-bottom: 6px;
}
.section-note-highlight {
  background: rgba(201,168,76,0.07);
  border: 1px solid rgba(201,168,76,0.2);
  border-left: 3px solid var(--gold);
  padding: 10px 14px; margin-bottom: 14px;
  font-size: 11px; color: var(--gold2); line-height: 1.8;
  border-radius: 0 8px 8px 0;
}
.section-note-highlight::before { content: '✦ '; font-size: 9px; }

/* ===== アイコンフレーム ===== */
.frame-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
}

.frame-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex; flex-direction: column;
}

.frame-img-wrap {
  width: 100%; aspect-ratio: 1 / 1;
  background: rgba(255,255,255,0.03);
  display: flex; align-items: center; justify-content: center;
  padding: 12px;
  border-bottom: 1px solid var(--border2);
}
.frame-img-wrap img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  -webkit-touch-callout: default;
}

.frame-info { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

.frame-name {
  font-size: 12px; font-weight: 700; color: var(--label);
  line-height: 1.4;
}
.frame-credit {
  font-size: 10px; color: var(--muted); letter-spacing: 0.5px;
}

.frame-link {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-decoration: none; margin-top: auto;
  background: linear-gradient(180deg, #f0d472 0%, #d4a830 55%, #b8901e 100%);
  border-radius: 8px; padding: 9px 14px;
  font-size: 11px; font-weight: 900;
  color: #1a0e00; letter-spacing: 1px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 3px 0 #7a5a0a, 0 5px 10px rgba(0,0,0,0.3);
  transition: transform 0.1s, filter 0.1s;
}
.frame-link:hover { filter: brightness(1.06); transform: translateY(-1px); }
.frame-link:active { transform: translateY(2px); }

/* ===== X風グリッド ===== */
.x-grid-2x2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.x-item {
  overflow: hidden;
  background: var(--card);
  cursor: pointer;
  aspect-ratio: 16 / 9;
  position: relative;
  border-radius: 10px;
  border: 1px solid var(--border2);
  transition: border-color 0.2s, transform 0.2s;
}
.x-item:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-2px); }
.x-item img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center center;
  display: block; transition: transform 0.2s;
  -webkit-touch-callout: default;
}
.x-item:hover img { transform: scale(1.03); }
.x-item::after {
  content: '✦ TAP';
  position: absolute; bottom: 7px; right: 9px;
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  color: rgba(255,255,255,0.7);
  background: rgba(0,0,0,0.45);
  padding: 3px 8px; border-radius: 4px;
  pointer-events: none;
}

/* ===== ライトボックス ===== */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.95); z-index: 1000;
  align-items: center; justify-content: center;
}
.lightbox.active { display: flex; }
.lightbox-img-wrap {
  max-width: 92vw; max-height: 88vh;
  display: flex; align-items: center; justify-content: center;
}
.lightbox-img-wrap img {
  max-width: 92vw; max-height: 82vh;
  object-fit: contain; display: block; border-radius: 4px;
  -webkit-touch-callout: default;
}
.lightbox-close {
  position: fixed; top: 16px; right: 20px;
  font-size: 1.8rem; color: var(--gold2);
  cursor: pointer; opacity: 0.7; z-index: 1001;
  background: none; border: none; line-height: 1;
}
.lightbox-close:hover { opacity: 1; }
.lightbox-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  font-size: 2rem; color: var(--gold2);
  cursor: pointer; opacity: 0.6; z-index: 1001;
  background: rgba(0,0,0,0.4); border: none;
  padding: 12px 10px; line-height: 1; border-radius: 4px;
  transition: opacity 0.2s;
}
.lightbox-nav:hover { opacity: 1; }
.lightbox-prev { left: 8px; }
.lightbox-next { right: 8px; }
.lightbox-counter {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-size: 12px; letter-spacing: 2px; color: var(--gold2); opacity: 0.6;
}
.lightbox-hint {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  font-size: 10px; letter-spacing: 1px;
  color: var(--muted); white-space: nowrap;
}

/* ===== FOOTER ===== */
.footer-note {
  text-align: center; font-size: 11px;
  color: var(--gold); opacity: 0.4; margin-top: 28px; line-height: 1.8;
}
</style>
</head>
<body>
<div class="wrapper">

  <a href="index.html" class="back-link">← Home</a>

  <div class="header">
    <div class="header-bg">
      <div class="header-star-row">
        <span>✦</span><span class="lg">✦</span><span>✦</span>
      </div>
      <div class="header-tag">JAYBIRDS — GALLERY</div>
      <h1><span class="accent">Gallery</span></h1>
      <p class="sub">布教画像・配布素材</p>
    </div>
    <div class="header-stripe"></div>
  </div>

  <!-- アイコンフレーム -->
  <div class="section">
    <p class="section-label">アイコンフレーム</p>
    <p class="section-note">アイコンデコッターでアイコンに使えるフレームです。</p>
    <div class="frame-grid">
      <div class="frame-item">
        <div class="frame-img-wrap">
          <img src="frame01.PNG" alt="ジュアンジェイ応援フレーム" loading="lazy">
        </div>
        <div class="frame-info">
          <p class="frame-name">ジュアンジェイ応援フレーム</p>
          <p class="frame-credit">✦ by JAYBIRDS</p>
          <a class="frame-link" href="https://icondecotter.jp/detail.php?id=107098" target="_blank" rel="noopener">
            🪶 フレームを使う
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- X布教画像 -->
  <div class="section">
    <p class="section-label">X布教画像</p>
    <p class="section-note">Xへの投稿・拡散用の布教素材です。</p>
    <div class="section-note-highlight">画像は一部だけ表示されています。タップすると全ての情報が確認できます。長押しで保存。</div>
    <div class="x-grid-2x2">
      <div class="x-item" onclick="openLightbox('fukyo01', 0)">
        <img src="fukyo01_01.JPG" alt="布教画像1" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 1)">
        <img src="fukyo01_02.JPG" alt="布教画像2" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 2)">
        <img src="fukyo01_03.JPG" alt="布教画像3" loading="lazy">
      </div>
      <div class="x-item" onclick="openLightbox('fukyo01', 3)">
        <img src="fukyo01_04.JPG" alt="布教画像4" loading="lazy">
      </div>
    </div>
  </div>

  <p class="footer-note">JAYBIRDS — Chuang Jay Fan Support Account</p>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightboxOutside(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1)">‹</button>
  <div class="lightbox-img-wrap">
    <img id="lightbox-img" src="" alt="">
  </div>
  <button class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1)">›</button>
  <div class="lightbox-hint">長押しで保存できます</div>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<script>
const galleries = {
  fukyo01: [
    'fukyo01_01.JPG',
    'fukyo01_02.JPG',
    'fukyo01_03.JPG',
    'fukyo01_04.JPG'
  ]
};

let currentGallery = null;
let currentIndex = 0;

function openLightbox(galleryId, index) {
  currentGallery = galleryId;
  currentIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function updateLightbox() {
  const imgs = galleries[currentGallery];
  document.getElementById('lightbox-img').src = imgs[currentIndex];
  document.getElementById('lightbox-counter').textContent =
    (currentIndex + 1) + ' / ' + imgs.length;
}

function navigateLightbox(dir) {
  const imgs = galleries[currentGallery];
  currentIndex = (currentIndex + dir + imgs.length) % imgs.length;
  updateLightbox();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function closeLightboxOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

let touchStartX = 0;
document.getElementById('lightbox').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
});
document.getElementById('lightbox').addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) navigateLightbox(diff > 0 ? 1 : -1);
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'ArrowRight') navigateLightbox(1);
  if (e.key === 'ArrowLeft') navigateLightbox(-1);
  if (e.key === 'Escape') closeLightbox();
});
</script>

</body>
</html>
